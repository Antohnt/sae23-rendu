# mosquitto.conf
# MQTT broker configuration for SAE 23

listener 1883
protocol mqtt

listener 9001
protocol websockets

# Allow anonymous connections (for testing, match IUT broker behavior)
allow_anonymous true

# Persistent storage
persistence true
persistence_location /mosquitto/data

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
